<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>방명록 | 추미정의 오선지와 원고지</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(to bottom, #fffdf8, #f8f4ec);
      color: #4b4036;
      line-height: 1.7;
    }

    a {
      color: #7a4e2d;
      text-decoration: none;
    }

    a:hover {
      color: #b06d3b;
    }

    .container {
      width: 90%;
      max-width: 980px;
      margin: 0 auto;
      padding: 50px 0 70px;
    }

    h1 {
      text-align: center;
      color: #6a4026;
      margin-bottom: 10px;
      font-size: 2.2rem;
    }

    .sub-text {
      text-align: center;
      color: #7c6a5d;
      margin-bottom: 28px;
      font-size: 1rem;
    }

    .login-guide {
      background: rgba(255, 250, 245, 0.95);
      border: 1px solid rgba(180, 135, 92, 0.16);
      border-radius: 18px;
      box-shadow: 0 8px 22px rgba(106, 64, 38, 0.06);
      padding: 24px 20px;
      margin-bottom: 24px;
      text-align: center;
    }

    .login-guide p {
      margin: 0 0 16px;
      color: #6a5648;
      font-size: 0.98rem;
    }

    .login-button {
      display: inline-block;
      padding: 12px 18px;
      background: linear-gradient(135deg, #d9a15f, #f0c98c);
      color: #4a321f;
      font-weight: bold;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(176, 109, 59, 0.18);
      transition: all 0.2s ease;
    }

    .login-button:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #e2af72, #f6d7a7);
      color: #4a321f;
    }

    .login-icons-box {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(180, 135, 92, 0.14);
      border-radius: 20px;
      box-shadow: 0 10px 28px rgba(106, 64, 38, 0.08);
      padding: 24px 20px;
      margin-bottom: 24px;
      text-align: center;
    }

    .login-icons-title {
      margin: 0 0 14px;
      color: #6a4026;
      font-size: 1.05rem;
      font-weight: bold;
    }

    .login-icons-desc {
      margin: 0 0 18px;
      color: #6a5648;
      font-size: 0.95rem;
    }

    .login-icons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .login-icon-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #fffaf5;
      border: 1px solid rgba(180, 135, 92, 0.18);
      box-shadow: 0 4px 12px rgba(106, 64, 38, 0.08);
      transition: all 0.2s ease;
    }

    .login-icon-link:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 8px 18px rgba(106, 64, 38, 0.12);
    }

    .login-icon {
      width: 28px;
      height: 28px;
      display: block;
    }

    .board-wrap {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(180, 135, 92, 0.14);
      border-radius: 20px;
      box-shadow: 0 10px 28px rgba(106, 64, 38, 0.08);
      padding: 30px;
    }

    .disqus-note {
      text-align: center;
      color: #8b7768;
      font-size: 0.92rem;
      margin-bottom: 14px;
    }

    .top-link-wrap {
      text-align: center;
      margin-top: 30px;
    }

    .top-link {
      display: inline-block;
      padding: 12px 18px;
      background: linear-gradient(135deg, #d9a15f, #f0c98c);
      color: #4a321f;
      font-weight: bold;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(176, 109, 59, 0.18);
      transition: all 0.2s ease;
    }

    .top-link:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #e2af72, #f6d7a7);
      color: #4a321f;
    }

    footer {
      text-align: center;
      padding: 30px 20px 40px;
      color: #8b7768;
    }

    @media (max-width: 768px) {
      .container {
        width: 92%;
        padding: 35px 0 50px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .board-wrap {
        padding: 20px 16px;
      }

      .login-guide,
      .login-icons-box {
        padding: 18px 14px;
      }

      .login-icons {
        gap: 12px;
      }

      .login-icon-link {
        width: 48px;
        height: 48px;
      }

      .login-icon {
        width: 24px;
        height: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>방명록</h1>
    <p class="sub-text">방문해주신 분들의 따뜻한 글과 인사를 남겨주세요.</p>

    <div class="login-guide">
      <p>방명록 작성은 Disqus 계정 또는 SNS 로그인 후 이용할 수 있습니다.</p>
      <a class="login-button" href="https://disqus.com/profile/login/" target="_blank">
        🔐 로그인 하러 가기
      </a>
    </div>

    <div class="login-icons-box">
      <p class="login-icons-title">사용 가능한 로그인 방식</p>
      <p class="login-icons-desc">아래 아이콘을 눌러 Disqus 로그인 화면으로 이동할 수 있습니다.</p>

      <div class="login-icons">
        <a class="login-icon-link" href="https://disqus.com/profile/login/" target="_blank" title="Disqus 로그인">
          <img class="login-icon" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/disqus.svg" alt="Disqus">
        </a>

        <a class="login-icon-link" href="https://disqus.com/profile/login/" target="_blank" title="Facebook 로그인">
          <img class="login-icon" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg" alt="Facebook">
        </a>

        <a class="login-icon-link" href="https://disqus.com/profile/login/" target="_blank" title="Google 로그인">
          <img class="login-icon" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/google.svg" alt="Google">
        </a>

        <a class="login-icon-link" href="https://disqus.com/profile/login/" target="_blank" title="Apple 로그인">
          <img class="login-icon" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/apple.svg" alt="Apple">
        </a>

        <a class="login-icon-link" href="https://disqus.com/profile/login/" target="_blank" title="X 로그인">
          <img class="login-icon" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg" alt="X">
        </a>

        <a class="login-icon-link" href="https://disqus.com/profile/login/" target="_blank" title="Microsoft 로그인">
          <img class="login-icon" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/microsoft.svg" alt="Microsoft">
        </a>
      </div>
    </div>

    <div class="board-wrap">
      <p class="disqus-note">아래 댓글 영역에서 로그인 후 바로 글을 남길 수 있습니다.</p>

      <div id="disqus_thread"></div>
      <script>
        var disqus_config = function () {
          this.page.url = 'https://chumijung.github.io/board.html';
          this.page.identifier = 'guestbook-board';
        };

        (function() {
          var d = document, s = d.createElement('script');
          s.src = 'https://chumijung.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
        })();
      </script>
      <noscript>
        JavaScript를 활성화해야 방명록을 볼 수 있습니다.
      </noscript>
    </div>

    <div class="top-link-wrap">
      <a class="top-link" href="index.html">홈페이지로 돌아가기</a>
    </div>
  </div>

  <footer>
    <p>© 2026 추미정의 오선지와 원고지. All Rights Reserved.</p>
  </footer>
</body>
</html>
