<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시판 | 추미정의 오선지와 원고지</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(to bottom, #fffdf8, #f8f4ec);
      color: #4b4036;
      line-height: 1.7;
    }

    .container {
      width: 90%;
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 0;
    }

    h1 {
      text-align: center;
      color: #6a4026;
      margin-bottom: 10px;
    }

    .sub-text {
      text-align: center;
      color: #7c6a5d;
      margin-bottom: 35px;
    }

    .board-wrap,
    .post-form,
    .post-item {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(180, 135, 92, 0.14);
      border-radius: 20px;
      box-shadow: 0 10px 28px rgba(106, 64, 38, 0.08);
    }

    .post-form {
      padding: 28px;
      margin-bottom: 30px;
    }

    .post-form input,
    .post-form textarea {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 14px;
      border: 1px solid #dbc5af;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      background: #fffdfa;
    }

    .post-form textarea {
      min-height: 140px;
      resize: vertical;
    }

    .button {
      display: inline-block;
      padding: 12px 18px;
      background: linear-gradient(135deg, #d9a15f, #f0c98c);
      color: #4a321f;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(176, 109, 59, 0.18);
    }

    .button:hover {
      background: linear-gradient(135deg, #e2af72, #f6d7a7);
    }

    .board-wrap {
      padding: 28px;
    }

    .board-title {
      font-size: 1.3rem;
      color: #6a4026;
      margin-top: 0;
      margin-bottom: 20px;
    }

    .post-item {
      padding: 20px;
      margin-bottom: 18px;
    }

    .post-item:last-child {
      margin-bottom: 0;
    }

    .post-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .post-author {
      font-weight: bold;
      color: #6a4026;
    }

    .post-date {
      color: #8c7b6f;
      font-size: 0.95rem;
    }

    .post-content {
      white-space: pre-line;
      color: #57493f;
    }

    .empty-text {
      color: #8c7b6f;
      text-align: center;
      padding: 20px 0;
    }

    .notice {
      margin-top: 14px;
      font-size: 0.92rem;
      color: #8c7b6f;
    }

    .top-link {
      display: inline-block;
      margin-top: 26px;
      color: #7a4e2d;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>게시판</h1>
    <p class="sub-text">방문자분들의 짧은 글과 인사를 남길 수 있는 공간입니다.</p>

    <div class="post-form">
      <input type="text" id="author" placeholder="이름을 입력해 주세요" />
      <textarea id="content" placeholder="남기고 싶은 글을 입력해 주세요"></textarea>
      <button class="button" onclick="addPost()">글 남기기</button>
      <p class="notice">
        ※ 현재 이 게시판은 테스트용으로, 작성한 글은 해당 브라우저에서만 저장됩니다.
      </p>
    </div>

    <div class="board-wrap">
      <h2 class="board-title">남겨진 글</h2>
      <div id="postList"></div>
    </div>

    <a class="top-link" href="index.html">← 홈페이지로 돌아가기</a>
  </div>

  <script>
    function getPosts() {
      return JSON.parse(localStorage.getItem("mj_board_posts") || "[]");
    }

    function savePosts(posts) {
      localStorage.setItem("mj_board_posts", JSON.stringify(posts));
    }

    function renderPosts() {
      const postList = document.getElementById("postList");
      const posts = getPosts();

      if (posts.length === 0) {
        postList.innerHTML = '<p class="empty-text">아직 남겨진 글이 없습니다. 첫 글을 남겨보세요.</p>';
        return;
      }

      postList.innerHTML = posts
        .slice()
        .reverse()
        .map(post => `
          <div class="post-item">
            <div class="post-header">
              <div class="post-author">${escapeHtml(post.author)}</div>
              <div class="post-date">${post.date}</div>
            </div>
            <div class="post-content">${escapeHtml(post.content).replace(/\n/g, "<br>")}</div>
          </div>
        `)
        .join("");
    }

    function addPost() {
      const authorInput = document.getElementById("author");
      const contentInput = document.getElementById("content");

      const author = authorInput.value.trim();
      const content = contentInput.value.trim();

      if (!author || !content) {
        alert("이름과 내용을 모두 입력해 주세요.");
        return;
      }

      const now = new Date();
      const dateText =
        now.getFullYear() + "." +
        String(now.getMonth() + 1).padStart(2, "0") + "." +
        String(now.getDate()).padStart(2, "0") + " " +
        String(now.getHours()).padStart(2, "0") + ":" +
        String(now.getMinutes()).padStart(2, "0");

      const posts = getPosts();
      posts.push({
        author,
        content,
        date: dateText
      });

      savePosts(posts);
      authorInput.value = "";
      contentInput.value = "";
      renderPosts();
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    renderPosts();
  </script>
</body>
</html>
